<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理咨询系统 - 用户管理</title>
    <link href="css/tailwind.min.css" rel="stylesheet">
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <link href="css/admin.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex">
    <aside class="sidebar bg-gray-800 text-white w-64 h-screen fixed left-0 top-0 overflow-y-auto">
        <div class="p-4 border-b border-gray-700">
            <div class="flex items-center gap-3">
                <div class="text-3xl">🧠</div>
                <span class="font-bold text-xl">心理咨询系统</span>
            </div>
        </div>
        
        <nav class="p-4">
            <div class="space-y-2">
                <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-700 rounded-lg">
                    <i class="fa fa-tachometer"></i>
                    <span>控制台</span>
                </a>
                
                <div class="menu-group">
                    <button class="menu-toggle flex items-center gap-3 px-3 py-2 w-full bg-purple-600 rounded-lg">
                        <i class="fa fa-users"></i>
                        <span>用户管理</span>
                        <i class="fa fa-chevron-down ml-auto"></i>
                    </button>
                    <div class="submenu ml-4 mt-2 space-y-1" style="display:block;">
                        <a href="users.html" class="block px-3 py-2 hover:bg-gray-700 rounded-lg text-sm bg-gray-700">
                            用户列表
                        </a>
                        <a href="counselors.html" class="block px-3 py-2 hover:bg-gray-700 rounded-lg text-sm">
                            咨询师管理
                        </a>
                    </div>
                </div>
                
                <a href="appointments.html" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-700 rounded-lg">
                    <i class="fa fa-calendar"></i>
                    <span>预约管理</span>
                </a>
                
                <a href="records.html" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-700 rounded-lg">
                    <i class="fa fa-file-text"></i>
                    <span>咨询记录</span>
                </a>
                
                <a href="schedule.html" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-700 rounded-lg">
                    <i class="fa fa-clock-o"></i>
                    <span>排班管理</span>
                </a>
                

                
                <a href="statistics.html" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-700 rounded-lg">
                    <i class="fa fa-bar-chart"></i>
                    <span>统计分析</span>
                </a>
                
                <a href="tests.html" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-700 rounded-lg"><i class="fa fa-check-square"></i><span>测评管理</span></a>
                <a href="science.html" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-700 rounded-lg"><i class="fa fa-book"></i><span>科普管理</span></a>
                <a href="announcement.html" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-700 rounded-lg">
                    <i class="fa fa-bullhorn"></i>
                    <span>公告管理</span>
                </a>
            </div>
        </nav>
        
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-700">
            <button id="logoutBtn" class="flex items-center gap-3 px-3 py-2 w-full hover:bg-gray-700 rounded-lg">
                <i class="fa fa-sign-out"></i>
                <span>退出登录</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 ml-64 p-6">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">用户管理</h1>
                <p class="text-gray-500">管理平台用户信息</p>
            </div>
            <button id="addUserBtn" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition flex items-center gap-2">
                <i class="fa fa-plus"></i>
                添加用户
            </button>
        </header>

        <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex gap-4 mb-6">
                <div class="flex-1 relative">
                    <input type="text" id="searchInput" placeholder="搜索用户名、手机号..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                    <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
                <select id="statusFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                    <option value="">全部状态</option>
                    <option value="active">正常</option>
                    <option value="inactive">禁用</option>
                </select>
                <button id="searchBtn" class="px-6 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
                    搜索
                </button>
            </div>

            <table class="w-full">
                <thead>
                    <tr class="border-b border-gray-200">
                        <th class="text-left py-3 px-4 text-gray-600 font-medium">用户ID</th>
                        <th class="text-left py-3 px-4 text-gray-600 font-medium">用户名</th>
                        <th class="text-left py-3 px-4 text-gray-600 font-medium">手机号</th>
                        <th class="text-left py-3 px-4 text-gray-600 font-medium">注册时间</th>
                        <th class="text-left py-3 px-4 text-gray-600 font-medium">状态</th>
                        <th class="text-left py-3 px-4 text-gray-600 font-medium">操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="6" class="text-center py-8 text-gray-500">加载中...</td></tr>
                </tbody>
            </table>

            <div class="flex justify-between items-center mt-6">
                    <p id="paginationText" class="text-gray-500"></p>
                    <div id="pageNumbers" class="flex gap-2">
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100" id="prevPage">上一页</button>
                        <span id="pageBtns"></span>
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100" id="nextPage">下一页</button>
                    </div>
                </div>
        </div>
    </main>

    <div id="userModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-xl font-bold text-gray-800">添加用户</h2>
                <button id="closeModal" class="text-gray-400 hover:text-gray-600">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2">用户名</label>
                    <input type="text" id="userName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2">手机号</label>
                    <input type="tel" id="userPhone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2">密码</label>
                    <input type="password" id="userPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                    <p class="text-xs text-gray-400 mt-1">编辑时留空则不修改密码</p>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2">状态</label>
                    <select id="userStatus" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                        <option value="active">正常</option>
                        <option value="inactive">禁用</option>
                    </select>
                </div>
                <div class="flex gap-3">
                    <button type="button" id="cancelBtn" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">取消</button>
                    <button type="submit" id="saveBtn" class="flex-1 px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">保存</button>
                    <button type="button" id="closeViewBtn" class="flex-1 px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 hidden">关闭</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('admin_token')) { window.location.href = 'index.html'; }
        let currentPage = 1;
        let totalPages = 1;
        let totalRecords = 0;

        document.addEventListener('DOMContentLoaded', function() {
            loadUsers();
            setupLogout();
            setupModal();
            setupSearch();
            setupPagination();
        });

        function loadUsers(page = 1) {
            const keyword = document.getElementById('searchInput').value.trim();
            let url = `http://localhost:8080/api/admin/users?page=${page}&size=10`;
            if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
            fetch(url, {
                headers: { Authorization: 'Bearer ' + localStorage.getItem('admin_token') }
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200 && data.data.records) {
                    currentPage = data.data.page || 1;
                    totalRecords = data.data.total || 0;
                    totalPages = Math.ceil(totalRecords / 10);

                    const tbody = document.getElementById('userTableBody');
                    tbody.innerHTML = data.data.records.map(user => {
                        const userId = 'U' + String(user.id).padStart(3, '0');
                        return `
                            <tr class="border-b border-gray-100 hover:bg-gray-50">
                                <td class="py-3 px-4 text-gray-800">${userId}</td>
                                <td class="py-3 px-4 text-gray-800">${user.username || user.nickname || '-'}</td>
                                <td class="py-3 px-4 text-gray-800">${user.phone ? user.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2') : '-'}</td>
                                <td class="py-3 px-4 text-gray-500">${user.createTime ? formatDateTime(user.createTime) : '-'}</td>
                                <td class="py-3 px-4"><span class="px-2 py-1 ${user.status === 'active' ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-600'} text-xs rounded-full">${user.status === 'active' ? '正常' : '禁用'}</span></td>
                                <td class="py-3 px-4">
                                    <button class="text-blue-600 hover:text-blue-800 mr-3" onclick="viewUser('${user.id}')">
                                        <i class="fa fa-eye"></i>
                                    </button>
                                    <button class="text-orange-600 hover:text-orange-800 mr-3" onclick="editUser('${user.id}')">
                                        <i class="fa fa-edit"></i>
                                    </button>
                                    <button class="text-red-600 hover:text-red-800" onclick="deleteUser('${user.id}')">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    }).join('');

                    updatePagination();
                }
            })
            .catch(err => console.error('加载用户失败:', err));
        }

        function updatePagination() {
            const start = (currentPage - 1) * 10 + 1;
            const end = Math.min(currentPage * 10, totalRecords);
            document.getElementById('paginationText').textContent = `显示 ${start}-${end} 条，共 ${totalRecords} 条`;
            document.getElementById('prevPage').disabled = currentPage <= 1;
            document.getElementById('nextPage').disabled = currentPage >= totalPages;
            const btnsEl = document.getElementById('pageBtns');
            const maxVisible = 5;
            let s = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let e = Math.min(totalPages, s + maxVisible - 1);
            if (e - s < maxVisible - 1) s = Math.max(1, e - maxVisible + 1);
            let html = '';
            if (s > 1) { html += `<button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100" onclick="goToPage(1)">1</button>`; if (s > 2) html += '<span class="px-2 text-gray-400">...</span>'; }
            for (let i = s; i <= e; i++) html += `<button class="px-3 py-1 border rounded ${i===currentPage?'bg-purple-600 text-white':'border-gray-300 hover:bg-gray-100'}" onclick="goToPage(${i})">${i}</button>`;
            if (e < totalPages) { if (e < totalPages - 1) html += '<span class="px-2 text-gray-400">...</span>'; html += `<button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100" onclick="goToPage(${totalPages})">${totalPages}</button>`; }
            btnsEl.innerHTML = html;
        }

        function goToPage(page) { loadUsers(page); }

        function setupPagination() {
            document.getElementById('prevPage').addEventListener('click', () => { if (currentPage > 1) loadUsers(currentPage - 1); });
            document.getElementById('nextPage').addEventListener('click', () => { if (currentPage < totalPages) loadUsers(currentPage + 1); });
        }

        function formatDateTime(date) {
            if (!date) return '-';
            const d = new Date(date);
            return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        function setupLogout() {
            document.getElementById('logoutBtn').addEventListener('click', function() {
                if (confirm('确定要退出登录吗？')) {
                    localStorage.removeItem('admin_token');
                    localStorage.removeItem('admin_user');
                    window.location.href = 'index.html';
                }
            });
        }

        function setFormEditable(editable) {
            ['userName', 'userPhone', 'userPassword', 'userStatus'].forEach(function(id) {
                document.getElementById(id).disabled = !editable;
            });
            document.getElementById('saveBtn').style.display = editable ? '' : 'none';
            document.getElementById('closeViewBtn').style.display = editable ? 'none' : '';
            document.getElementById('cancelBtn').style.display = editable ? '' : 'none';
        }

        function setupModal() {
            document.getElementById('addUserBtn').addEventListener('click', function() {
                document.getElementById('modalTitle').textContent = '添加用户';
                document.getElementById('userId').value = '';
                document.getElementById('userName').value = '';
                document.getElementById('userPhone').value = '';
                document.getElementById('userPassword').value = '';
                document.getElementById('userStatus').value = 'active';
                setFormEditable(true);
                document.getElementById('userModal').style.display = 'flex';
            });

            document.getElementById('closeModal').addEventListener('click', function() {
                document.getElementById('userModal').style.display = 'none';
            });

            document.getElementById('closeViewBtn').addEventListener('click', function() {
                document.getElementById('userModal').style.display = 'none';
            });

            document.getElementById('cancelBtn').addEventListener('click', function() {
                document.getElementById('userModal').style.display = 'none';
            });

            document.getElementById('userForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const data = {
                    username: document.getElementById('userName').value,
                    phone: document.getElementById('userPhone').value,
                    status: document.getElementById('userStatus').value
                };
                if (document.getElementById('userPassword').value) {
                    data.password = document.getElementById('userPassword').value;
                }

                const userId = document.getElementById('userId').value;
                const url = userId ? `/api/admin/users/${userId}` : '/api/admin/users';
                const method = userId ? 'PUT' : 'POST';

                fetch('http://localhost:8080' + url, {
                    method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('admin_token')
                    },
                    body: JSON.stringify(data)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.code === 200) {
                        alert(userId ? '修改成功' : '添加成功');
                        document.getElementById('userModal').style.display = 'none';
                        loadUsers();
                    } else {
                        alert(data.msg || '操作失败');
                    }
                })
                .catch(err => {
                    console.error('操作失败:', err);
                    alert('操作失败');
                });
            });
        }

        function viewUser(id) {
            fetch('http://localhost:8080/api/admin/users/' + id, {
                headers: { Authorization: 'Bearer ' + localStorage.getItem('admin_token') }
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    const user = data.data;
                    document.getElementById('modalTitle').textContent = '查看用户';
                    document.getElementById('userId').value = user.id;
                    document.getElementById('userName').value = user.username || user.nickname || '';
                    document.getElementById('userPhone').value = user.phone || '';
                    document.getElementById('userPassword').value = '';
                    document.getElementById('userStatus').value = user.status || 'active';
                    setFormEditable(false);
                    document.getElementById('userModal').style.display = 'flex';
                }
            })
            .catch(err => console.error('查看用户失败:', err));
        }

        function editUser(id) {
            fetch('http://localhost:8080/api/admin/users/' + id, {
                headers: { Authorization: 'Bearer ' + localStorage.getItem('admin_token') }
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    const user = data.data;
                    document.getElementById('modalTitle').textContent = '编辑用户';
                    document.getElementById('userId').value = user.id;
                    document.getElementById('userName').value = user.username || user.nickname || '';
                    document.getElementById('userPhone').value = user.phone || '';
                    document.getElementById('userPassword').value = '';
                    document.getElementById('userStatus').value = user.status || 'active';
                    setFormEditable(true);
                    document.getElementById('userModal').style.display = 'flex';
                }
            })
            .catch(err => console.error('获取用户失败:', err));
        }

        function deleteUser(id) {
            if (confirm('确定要删除这个用户吗？')) {
                fetch('http://localhost:8080/api/admin/users/' + id, {
                    method: 'DELETE',
                    headers: { Authorization: 'Bearer ' + localStorage.getItem('admin_token') }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.code === 200) {
                        alert('删除成功');
                        loadUsers();
                    } else {
                        alert(data.msg || '删除失败');
                    }
                })
                .catch(err => {
                    console.error('删除失败:', err);
                    alert('删除失败');
                });
            }
        }

        function setupSearch() {
            document.getElementById('searchBtn').addEventListener('click', function() {
                loadUsers();
            });
        }
    </script>
</body>
</html>
