<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f8f0f6;
        }
        .container { width: 480px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        h1 { font-size: 64px; color: #8b6b7a; }
        .scores { display: flex; gap: 8px; }
        .score-box {
            background: #c9a0b8;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
        }
        .score-box span { display: block; font-size: 24px; font-weight: bold; }
        .btn {
            background: #b8849a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background: #c99ab0; }
        .board {
            position: relative;
            background: #d4b8c8;
            border-radius: 8px;
            width: 480px;
            height: 480px;
            padding: 12px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            height: 100%;
        }
        .cell {
            background: rgba(255, 240, 248, 0.4);
            border-radius: 6px;
        }
        .tile-container {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
        }
        .tile {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            border-radius: 6px;
            transition: transform 120ms ease-in-out;
            z-index: 1;
        }
        .tile.new { animation: pop 200ms ease; }
        @keyframes pop {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .message {
            position: absolute;
            inset: 0;
            background: rgba(255, 240, 248, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #8b6b7a;
            border-radius: 8px;
            z-index: 10;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">Score<span id="score">0</span></div>
                <div class="score-box">Best<span id="best">0</span></div>
            </div>
            <button class="btn" id="new-game">New Game</button>
        </div>
        <div class="board">
            <div class="grid">
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
            <div class="tile-container" id="tile-container"></div>
            <div class="message hidden" id="message"></div>
        </div>
    </div>
    <script>
        const SIZE = 4;
        let board = [];
        let score = 0;
        let best = 0;

        function initBoard() {
            board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
            score = 0;
            addRandomTile();
            addRandomTile();
            updateScore();
        }

        function getEmptyCells() {
            const empty = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) empty.push({r, c});
                }
            }
            return empty;
        }

        function addRandomTile() {
            const empty = getEmptyCells();
            if (empty.length === 0) return;
            const {r, c} = empty[Math.floor(Math.random() * empty.length)];
            board[r][c] = Math.random() < 0.9 ? 2 : 4;
            newTiles.add(`${r},${c}`);
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > best) {
                best = score;
                document.getElementById('best').textContent = best;
                localStorage.setItem('best2048', best);
            }
        }

        function updateBest() {
            document.getElementById('best').textContent = best;
        }

        function slideAndMerge(row) {
            let arr = row.filter(v => v !== 0);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr[i + 1] = 0;
                }
            }
            arr = arr.filter(v => v !== 0);
            while (arr.length < SIZE) arr.push(0);
            return arr;
        }

        function moveBoard(direction) {
            const oldBoard = board.map(row => [...row]);

            if (direction === 'left') {
                for (let r = 0; r < SIZE; r++) {
                    board[r] = slideAndMerge(board[r]);
                }
            } else if (direction === 'right') {
                for (let r = 0; r < SIZE; r++) {
                    board[r] = slideAndMerge([...board[r]].reverse()).reverse();
                }
            } else if (direction === 'up') {
                for (let c = 0; c < SIZE; c++) {
                    let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    col = slideAndMerge(col);
                    for (let r = 0; r < SIZE; r++) board[r][c] = col[r];
                }
            } else if (direction === 'down') {
                for (let c = 0; c < SIZE; c++) {
                    let col = [board[3][c], board[2][c], board[1][c], board[0][c]];
                    col = slideAndMerge(col);
                    for (let r = 0; r < SIZE; r++) board[3 - r][c] = col[r];
                }
            }

            const changed = !board.every((row, r) =>
                row.every((v, c) => v === oldBoard[r][c])
            );

            if (changed) {
                addRandomTile();
                updateScore();
            }

            return {changed, oldBoard};
        }

        function hasWon() {
            return board.some(row => row.some(v => v === 2048));
        }

        function hasLost() {
            if (getEmptyCells().length > 0) return false;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (c < SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
                    if (r < SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
                }
            }
            return true;
        }

        const tileContainer = document.getElementById('tile-container');
        const CELL_SIZE = 105;
        const GAP = 12;
        let newTiles = new Set();

        function getTileColor(value) {
            const colors = {
                2:    {bg: '#fce4ec', fg: '#8b6b7a'},
                4:    {bg: '#ffe0cc', fg: '#8b6b7a'},
                8:    {bg: '#ffb3ba', fg: '#ffffff'},
                16:   {bg: '#ffcc80', fg: '#ffffff'},
                32:   {bg: '#ff9aa2', fg: '#ffffff'},
                64:   {bg: '#ff6f8f', fg: '#ffffff'},
                128:  {bg: '#d5b4d9', fg: '#ffffff'},
                256:  {bg: '#c49bc9', fg: '#ffffff'},
                512:  {bg: '#b57edc', fg: '#ffffff'},
                1024: {bg: '#e891b9', fg: '#ffffff'},
                2048: {bg: '#ff69b4', fg: '#ffffff'},
            };
            return colors[value] || {bg: '#f0c040', fg: '#ffffff'};
        }

        function renderBoard() {
            tileContainer.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) continue;
                    const tile = document.createElement('div');
                    const isNew = newTiles.has(`${r},${c}`);
                    tile.className = 'tile' + (isNew ? ' new' : '');
                    tile.textContent = board[r][c];
                    const {bg, fg} = getTileColor(board[r][c]);
                    tile.style.backgroundColor = bg;
                    tile.style.color = fg;
                    tile.style.width = tile.style.height = CELL_SIZE + 'px';
                    tile.style.transform = `translate(${c * (CELL_SIZE + GAP)}px, ${r * (CELL_SIZE + GAP)}px)`;
                    const fontSize = board[r][c] >= 1000 ? '32px' : board[r][c] >= 100 ? '36px' : '40px';
                    tile.style.fontSize = fontSize;
                    tileContainer.appendChild(tile);
                }
            }
            newTiles.clear();
        }

        let processing = false;

        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        function handleMove(direction) {
            if (processing) return;
            processing = true;

            const {changed} = moveBoard(direction);

            if (changed) {
                renderBoard();
                if (hasWon()) showMessage('You Win!');
                else if (hasLost()) showMessage('Game Over');
            }

            setTimeout(() => { processing = false; }, 150);
        }

        document.addEventListener('keydown', (e) => {
            const keys = {
                'ArrowLeft': 'left',
                'ArrowRight': 'right',
                'ArrowUp': 'up',
                'ArrowDown': 'down',
            };
            if (keys[e.key]) {
                e.preventDefault();
                handleMove(keys[e.key]);
            }
        });

        document.getElementById('new-game').addEventListener('click', () => {
            initBoard();
            hideMessage();
            renderBoard();
        });

        // Start the game
        best = parseInt(localStorage.getItem('best2048') || '0');
        updateBest();
        initBoard();
        renderBoard();
    </script>
</body>
</html>
