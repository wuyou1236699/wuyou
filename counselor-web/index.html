<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>咨询师登录</title>
  <link rel="stylesheet" href="css/tailwind.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --bg:       #FDF8F5;
      --primary:  #FF7E67;
      --primary-hover: #FF6A4F;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* subtle ambient background circles */
    .bg-decor {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
    }
    .bg-decor::before,
    .bg-decor::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
    }
    .bg-decor::before {
      width: 500px; height: 500px;
      background: var(--primary);
      top: -180px; right: -120px;
    }
    .bg-decor::after {
      width: 400px; height: 400px;
      background: var(--primary);
      bottom: -140px; left: -100px;
    }

    .login-card {
      position: relative; z-index: 1;
      width: 420px; max-width: 92vw;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(255, 126, 103, 0.12), 0 4px 16px rgba(0,0,0,0.04);
      padding: 48px 40px 40px;
    }

    .input-group {
      position: relative; margin-bottom: 20px;
    }
    .input-group i {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: #C4B5AE; font-size: 16px; transition: color 0.25s;
    }
    .input-group input {
      width: 100%; height: 50px;
      padding: 0 16px 0 44px;
      border: 1.5px solid #E8DFD8;
      border-radius: 12px;
      font-size: 15px;
      color: #3D322B;
      background: #FEFCFA;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .input-group input::placeholder { color: #C4B5AE; }
    .input-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255,126,103,0.1);
    }
    .input-group input:focus + i,
    .input-group input:focus ~ i { display: none; }
    .input-group:focus-within i { color: var(--primary); }

    .btn-login {
      width: 100%; height: 50px;
      background: linear-gradient(135deg, #FF7E67, #FF9A7B);
      color: #fff; border: none;
      border-radius: 12px;
      font-size: 17px; font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover {
      box-shadow: 0 8px 24px rgba(255,126,103,0.35);
      transform: translateY(-1px);
    }
    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(255,126,103,0.25);
    }
    .btn-login:disabled {
      opacity: 0.6; cursor: not-allowed; transform: none;
      box-shadow: none;
    }

    .error-msg {
      display: none;
      align-items: center; gap: 6px;
      margin-top: 14px; padding: 12px 16px;
      background: #FFF0ED; border-radius: 10px;
      color: #D94A38; font-size: 14px;
      border-left: 3px solid #FF7E67;
    }
    .error-msg.show { display: flex; }

    /* spinner for loading state */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="bg-decor"></div>

  <div class="login-card">
    <!-- Title -->
    <div class="text-center" style="margin-bottom:36px;">
      <div style="font-size:48px; line-height:1; margin-bottom:12px;">
        &#x1F9E0;
      </div>
      <h1 style="font-size:24px; font-weight:700; color:#3D322B; letter-spacing:0.03em;">
        咨询师登录
      </h1>
      <p style="font-size:14px; color:#B8A69B; margin-top:6px;">
        欢迎回来，请登录您的账户
      </p>
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>
      <!-- Username -->
      <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input
          type="text"
          id="username"
          placeholder="请输入用户名"
          autocomplete="username"
          required
        />
      </div>

      <!-- Password -->
      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input
          type="password"
          id="password"
          placeholder="请输入密码"
          autocomplete="current-password"
          required
        />
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-login" id="loginBtn">
        <span id="btnText">登 录</span>
      </button>

      <!-- Error message -->
      <div class="error-msg" id="errorMsg">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="errorText"></span>
      </div>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script>
    (function () {
      // ---------- redirect if already logged in ----------
      if (localStorage.getItem('counselor_token')) {
        window.location.replace('home.html');
        return;
      }

      // ---------- DOM refs ----------
      const form      = document.getElementById('loginForm');
      const username  = document.getElementById('username');
      const password  = document.getElementById('password');
      const loginBtn  = document.getElementById('loginBtn');
      const btnText   = document.getElementById('btnText');
      const errorMsg  = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');

      // ---------- helpers ----------
      function showError(msg) {
        errorText.textContent = msg;
        errorMsg.classList.add('show');
      }

      function hideError() {
        errorMsg.classList.remove('show');
      }

      function setLoading(loading) {
        if (loading) {
          loginBtn.disabled = true;
          btnText.innerHTML = '<span class="spinner"></span> 登录中...';
        } else {
          loginBtn.disabled = false;
          btnText.textContent = '登 录';
        }
      }

      // ---------- submit ----------
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        hideError();

        const user = username.value.trim();
        const pass = password.value;

        if (!user) { showError('请输入用户名'); username.focus(); return; }
        if (!pass) { showError('请输入密码');   password.focus(); return; }

        setLoading(true);

        try {
          const res = await api.post('/api/counselor/login', {
            username: user,
            password: pass
          });

          // res is already parsed JSON from api.js
          if (res.code === 200 && res.data) {
            localStorage.setItem('counselor_token', res.data.token || '');
            localStorage.setItem('counselor_info', JSON.stringify(
              res.data.counselor || res.data
            ));
            window.location.replace('home.html');
          } else {
            showError(res.message || '登录失败，请检查用户名和密码');
          }
        } catch (err) {
          // network error or the 401 redirect in api.js will fire first
          if (err.message && err.message !== '未登录') {
            showError(err.message);
          } else {
            showError('网络异常，请稍后重试');
          }
        } finally {
          setLoading(false);
        }
      });

      // clear error on typing
      [username, password].forEach(function (el) {
        el.addEventListener('input', hideError);
      });
    })();
  </script>

</body>
</html>
