<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理科普 - 心理咨询</title>
    <link href="css/tailwind.min.css" rel="stylesheet">
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #FDF8F5;
            --primary: #FF7E67;
            --primary-dark: #E8694F;
            --primary-light: #FFF0ED;
            --primary-50: #FFF5F3;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Roboto, sans-serif;
            color: #333;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Buttons */
        .btn-primary {
            background-color: var(--primary);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(255, 126, 103, 0.35);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-outline:hover {
            background-color: var(--primary-50);
        }

        .btn-white {
            background: #fff;
            color: #666;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-white:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: var(--primary-50);
        }

        /* Dropdown */
        .dropdown-menu {
            display: none;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .dropdown-menu.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Category pills */
        .category-pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            border: 1px solid #e5e7eb;
            background: #fff;
            color: #666;
        }
        .category-pill:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-50);
        }
        .category-pill.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* Category scroll container */
        .category-scroll {
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        /* Article card */
        .article-card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
            overflow: hidden;
        }
        .article-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 126, 103, 0.12);
        }
        .article-card .cover-img {
            transition: transform 0.4s ease;
        }
        .article-card:hover .cover-img {
            transform: scale(1.05);
        }

        /* Rich content styling */
        .rich-content {
            font-size: 15px;
            line-height: 1.85;
            color: #374151;
            word-break: break-word;
        }
        .rich-content p {
            margin-bottom: 1em;
        }
        .rich-content h2, .rich-content h3, .rich-content h4 {
            font-weight: 600;
            color: #1f2937;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        .rich-content img {
            max-width: 100%;
            border-radius: 12px;
            margin: 1em 0;
        }
        .rich-content ul, .rich-content ol {
            padding-left: 1.5em;
            margin-bottom: 1em;
        }
        .rich-content li {
            margin-bottom: 0.25em;
        }
        .rich-content blockquote {
            border-left: 3px solid var(--primary);
            padding-left: 1em;
            margin: 1em 0;
            color: #6b7280;
            background: #f9fafb;
            padding: 0.75em 1em;
            border-radius: 0 8px 8px 0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* Mobile nav */
        .mobile-nav-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 40;
            display: none;
        }
        .mobile-nav-overlay.show { display: block; }

        .mobile-nav-panel {
            position: fixed;
            top: 0; right: 0;
            width: 260px;
            height: 100vh;
            background: #fff;
            z-index: 50;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -4px 0 20px rgba(0,0,0,0.08);
        }
        .mobile-nav-panel.show {
            transform: translateX(0);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- ==================== TOP NAVIGATION ==================== -->
    <nav class="sticky top-0 bg-white shadow-sm z-30">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="home.html" class="flex items-center space-x-2 text-xl font-bold no-underline" style="color: var(--primary);">
                <span class="text-2xl">&#x1F9E0;</span>
                <span class="hidden sm:inline">心理咨询</span>
            </a>

            <div class="hidden md:flex items-center space-x-7">
                <a href="home.html" class="text-sm text-gray-600 hover:text-gray-900 no-underline transition-colors">首页</a>
                <a href="chat.html" class="text-sm text-gray-600 hover:text-gray-900 no-underline transition-colors">AI对话</a>

                <div class="relative" id="userDropdown">

                        <div id="navAvatar" class="flex items-center justify-center rounded-full w-8 h-8 text-white text-sm flex-shrink-0" style="background-color: var(--primary);">

                        <a href="profile.html" class="flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 no-underline transition-colors rounded-t-xl">
                            <i class="fas fa-user-circle mr-3 text-gray-400"></i>个人中心

                            <i class="fas fa-sign-out-alt mr-3"></i>退出登录
                        </button>
                    </div>
                </div>
            </div>

            <button id="mobileMenuBtn" class="md:hidden text-gray-600 hover:text-gray-900 focus:outline-none bg-transparent border-0 cursor-pointer p-2">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </div>
    </nav>

    <!-- Mobile nav -->
    <div id="mobileOverlay" class="mobile-nav-overlay"></div>
    <div id="mobilePanel" class="mobile-nav-panel">
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
            <span class="font-bold text-lg" style="color: var(--primary);">&#x1F9E0; 心理咨询</span>
            <button id="mobileCloseBtn" class="text-gray-400 hover:text-gray-600 bg-transparent border-0 cursor-pointer p-1">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="px-5 py-4 space-y-1">
            <a href="home.html" class="block py-3 text-sm text-gray-700 hover:bg-gray-50 no-underline rounded-lg px-3 transition-colors">首页</a>
            <a href="chat.html" class="block py-3 text-sm text-gray-700 hover:bg-gray-50 no-underline rounded-lg px-3 transition-colors">AI对话</a>
            <a href="science.html" class="block py-3 text-sm font-semibold no-underline rounded-lg px-3" style="color: var(--primary); background: var(--primary-50);">科普</a>
            <a href="tests.html" class="block py-3 text-sm text-gray-700 hover:bg-gray-50 no-underline rounded-lg px-3 transition-colors">测评</a>
            <hr class="my-3 border-gray-100">
            <a href="profile.html" class="block py-3 text-sm text-gray-700 hover:bg-gray-50 no-underline rounded-lg px-3 transition-colors">
                <i class="fas fa-user-circle mr-2 text-gray-400"></i>个人中心
            </a>
            <button onclick="logout()" class="w-full flex items-center py-3 text-sm text-red-500 hover:bg-red-50 rounded-lg px-3 transition-colors bg-transparent border-0 cursor-pointer">
                <i class="fas fa-sign-out-alt mr-2"></i>退出登录
            </button>
        </div>
    </div>

    <!-- ==================== PAGE HEADER ==================== -->
    <section class="py-8 md:py-12" style="background: linear-gradient(160deg, #FFF0ED 0%, #FDF8F5 40%, #FFF8F6 70%, #FDF8F5 100%);">
        <div class="max-w-6xl mx-auto px-4">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2" id="viewTitle">心理科普</h1>
            <p class="text-sm md:text-base text-gray-500" id="viewSubtitle">了解心理学知识，关注心理健康</p>
        </div>
    </section>

    <!-- ==================== ARTICLE LIST VIEW ==================== -->
    <section id="articleListView" class="max-w-6xl mx-auto px-4 pb-16">
        <!-- Category tabs -->
        <div class="category-scroll mt-6 mb-6 pb-1">
            <div id="categoryContainer" class="flex items-center space-x-2 px-1">
                <!-- Dynamically rendered -->
            </div>
        </div>

        <!-- Article grid -->
        <div id="articleGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            <!-- Dynamically rendered -->
        </div>

        <!-- Loading -->
        <div id="articleLoading" class="text-center py-12" style="display:none;">
            <div class="inline-flex items-center space-x-2 text-gray-400">
                <i class="fas fa-spinner fa-spin"></i>
                <span class="text-sm">正在加载文章...</span>
            </div>
        </div>

        <!-- Empty -->
        <div id="articleEmpty" class="text-center py-16" style="display:none;">
            <div class="w-20 h-20 mx-auto mb-4 rounded-full flex items-center justify-center" style="background: #f3f4f6;">
                <i class="fas fa-newspaper text-gray-300 text-3xl"></i>
            </div>
            <p class="text-gray-500 font-medium">暂无科普文章</p>
            <p class="text-gray-400 text-sm mt-1">请稍后再来查看</p>
        </div>

        <!-- Load more -->
        <div id="loadMoreContainer" class="text-center mt-8" style="display:none;">
            <button id="loadMoreBtn" class="btn-white px-10 py-3 rounded-full text-sm font-medium">
                加载更多 <i class="fas fa-chevron-down ml-1 text-xs"></i>
            </button>
        </div>

        <!-- End indicator -->
        <div id="endIndicator" class="text-center mt-8" style="display:none;">
            <div class="inline-flex items-center space-x-2 text-gray-300">
                <span class="w-8 h-px bg-gray-200"></span>
                <span class="text-xs">已经到底了</span>
                <span class="w-8 h-px bg-gray-200"></span>
            </div>
        </div>
    </section>

    <!-- ==================== ARTICLE DETAIL VIEW ==================== -->
    <section id="articleDetailView" class="max-w-3xl mx-auto px-4 pb-16" style="display:none;">
        <!-- Back button -->
        <div class="mt-6 mb-6">
            <button id="btnBackToList" class="btn-white px-4 py-2 rounded-lg text-sm font-medium">
                <i class="fas fa-arrow-left mr-2"></i>返回文章列表
            </button>
        </div>

        <!-- Article cover image -->
        <div id="detailCover" class="w-full aspect-[21/9] rounded-2xl bg-gray-100 mb-6 overflow-hidden">
            <!-- Dynamically set background image -->
        </div>

        <!-- Article meta -->
        <div class="mb-6">
            <h1 id="detailTitle" class="text-2xl md:text-3xl font-bold text-gray-800 mb-3 leading-snug"></h1>
            <div class="flex flex-wrap items-center space-x-3 text-xs text-gray-400">
                <span id="detailCategory" class="px-2.5 py-0.5 rounded-full text-xs font-medium" style="background: var(--primary-light); color: var(--primary);"></span>
                <span id="detailReadCount"><i class="fas fa-eye mr-1"></i></span>
                <span id="detailDate"><i class="fas fa-calendar-alt mr-1"></i></span>
            </div>
        </div>

        <!-- Divider -->
        <div class="border-t border-gray-100 mb-6"></div>

        <!-- Article content -->
        <div id="detailContent" class="rich-content">
            <!-- Dynamically rendered -->
        </div>

        <!-- Loading -->
        <div id="detailLoading" class="text-center py-16">
            <div class="inline-flex flex-col items-center space-y-3 text-gray-400">
                <i class="fas fa-spinner fa-spin text-3xl"></i>
                <span class="text-sm">正在加载文章...</span>
            </div>
        </div>
    </section>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
    (function () {
        'use strict';

        if (!checkLogin()) return;

        // ==================== STATE ====================
        var categories = [];
        var articles = [];
        var currentCategoryId = null; // null = all
        var currentPage = 1;
        var totalPages = 1;
        var pageSize = 20;
        var isLoading = false;

        // ==================== INIT USER ====================
        var userInfo = getUserInfo();
        if (userInfo) {
            var nickname = userInfo.nickname || userInfo.username || userInfo.name || '用户';
            document.getElementById('navNickname').textContent = nickname;
            document.getElementById('navAvatarText').textContent = (nickname.charAt(0) || '用').toUpperCase();
            if (userInfo.avatar) {
                var navAvatar = document.getElementById('navAvatar');
                navAvatar.style.backgroundImage = 'url(' + userInfo.avatar + ')';
                navAvatar.style.backgroundSize = 'cover';
                navAvatar.style.backgroundPosition = 'center';
                document.getElementById('navAvatarText').style.display = 'none';
            }
        }

        // ==================== DROPDOWN ====================
        (function () {
            var btn = document.getElementById('dropdownBtn');
            var menu = document.getElementById('dropdownMenu');
            var isOpen = false;
            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                isOpen = !isOpen;
                menu.classList.toggle('show', isOpen);
            });
            document.addEventListener('click', function () {
                if (isOpen) { isOpen = false; menu.classList.remove('show'); }
            });
            menu.addEventListener('click', function (e) { e.stopPropagation(); });
        })();

        // ==================== MOBILE MENU ====================
        (function () {
            var menuBtn = document.getElementById('mobileMenuBtn');
            var closeBtn = document.getElementById('mobileCloseBtn');
            var overlay = document.getElementById('mobileOverlay');
            var panel = document.getElementById('mobilePanel');
            function open() {
                overlay.classList.add('show');
                panel.classList.add('show');
                document.body.style.overflow = 'hidden';
            }
            function close() {
                overlay.classList.remove('show');
                panel.classList.remove('show');
                document.body.style.overflow = '';
            }
            menuBtn.addEventListener('click', open);
            closeBtn.addEventListener('click', close);
            overlay.addEventListener('click', close);
        })();

        // ==================== LOGOUT ====================
        window.logout = function () {
            localStorage.removeItem('user_token');
            localStorage.removeItem('user_info');
            window.location.href = 'index.html';
        };

        // ==================== ESCAPE HTML ====================
        function escapeHTML(str) {
            if (!str) return '';
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        // ==================== PARSE HELPER ====================
        function parseArray(res) {
            if (Array.isArray(res)) return res;
            if (res && res.data) {
                if (Array.isArray(res.data)) return res.data;
                if (res.data.records) return res.data.records;
            }
            return [];
        }

        function parseData(res) {
            if (res && res.data) return res.data;
            return res;
        }

        // ==================== LOAD CATEGORIES ====================
        function loadCategories() {
            api.get('/api/science/categories')
                .then(function (res) {
                    var list = parseArray(res);
                    categories = list;
                    renderCategories();
                })
                .catch(function (err) {
                    console.error('Failed to load categories:', err);
                    // Non-critical, continue without categories
                    renderCategories();
                });
        }

        function renderCategories() {
            var container = document.getElementById('categoryContainer');
            var html = '';

            // "All" pill
            html += '<span class="category-pill active" data-cat-id="">全部</span>';

            categories.forEach(function (cat) {
                var id = cat.id;
                var name = cat.name || cat.categoryName || '';
                var icon = cat.icon || '';
                var iconHTML = icon ? '<i class="fas ' + escapeHTML(icon) + ' mr-1.5"></i>' : '';
                html += '<span class="category-pill" data-cat-id="' + id + '">' + iconHTML + escapeHTML(name) + '</span>';
            });

            container.innerHTML = html;

            // Bind click events
            container.querySelectorAll('.category-pill').forEach(function (pill) {
                pill.addEventListener('click', function () {
                    var catId = pill.getAttribute('data-cat-id');
                    catId = catId === '' ? null : catId;
                    if (catId === currentCategoryId) return;

                    // Update active state
                    container.querySelectorAll('.category-pill').forEach(function (p) {
                        p.classList.remove('active');
                    });
                    pill.classList.add('active');

                    // Reload articles
                    currentCategoryId = catId;
                    currentPage = 1;
                    articles = [];
                    loadArticles(false);
                });
            });
        }

        // ==================== LOAD ARTICLES ====================
        function loadArticles(append) {
            if (isLoading) return;
            isLoading = true;

            var loadingEl = document.getElementById('articleLoading');
            var emptyEl = document.getElementById('articleEmpty');
            var loadMoreEl = document.getElementById('loadMoreContainer');
            var endEl = document.getElementById('endIndicator');
            var grid = document.getElementById('articleGrid');

            if (!append) {
                grid.innerHTML = '';
                emptyEl.style.display = 'none';
                loadMoreEl.style.display = 'none';
                endEl.style.display = 'none';
            }
            loadingEl.style.display = 'block';

            var url = '/api/science/articles?page=' + currentPage + '&size=' + pageSize;
            if (currentCategoryId) {
                url += '&categoryId=' + currentCategoryId;
            }

            api.get(url)
                .then(function (res) {
                    loadingEl.style.display = 'none';

                    var records = [];
                    if (Array.isArray(res)) {
                        records = res;
                    } else if (res && res.data) {
                        if (Array.isArray(res.data)) {
                            records = res.data;
                        } else if (res.data.records) {
                            records = res.data.records;
                            totalPages = res.data.pages || 1;
                        } else if (res.data.list) {
                            records = res.data.list;
                            totalPages = res.data.pages || Math.ceil((res.data.total || records.length) / pageSize);
                        }
                    }

                    if (records.length === 0) {
                        if (!append) {
                            emptyEl.style.display = 'block';
                        }
                        endEl.style.display = 'block';
                        isLoading = false;
                        return;
                    }

                    if (append) {
                        articles = articles.concat(records);
                    } else {
                        articles = records;
                    }
                    renderArticles(articles, append);

                    // Show load more or end
                    if (currentPage < totalPages && records.length >= pageSize) {
                        loadMoreEl.style.display = 'block';
                        endEl.style.display = 'none';
                    } else {
                        loadMoreEl.style.display = 'none';
                        endEl.style.display = 'block';
                    }

                    isLoading = false;
                })
                .catch(function (err) {
                    loadingEl.style.display = 'none';
                    isLoading = false;
                    if (!append) {
                        emptyEl.style.display = 'block';
                    }
                    console.error('Failed to load articles:', err);
                    showToast('加载文章失败，请重试', 'error');
                });
        }

        function renderArticles(list, append) {
            var grid = document.getElementById('articleGrid');
            if (!append) {
                grid.innerHTML = '';
            }

            list.forEach(function (article) {
                var id = article.id;
                var title = article.title || '未命名文章';
                var cover = article.coverImage || article.cover || article.image || '';
                var categoryName = article.categoryName || article.category || '';
                var readCount = article.readCount || article.views || article.viewCount || 0;
                var date = formatDate(article.createdAt || article.createTime || article.publishDate || article.date);
                var summary = article.summary || article.excerpt || article.desc || '';

                var coverHTML;
                if (cover) {
                    coverHTML = '<div class="aspect-[16/10] bg-gray-100 overflow-hidden">' +
                        '<img class="cover-img w-full h-full object-cover" src="' + escapeHTML(cover) + '" alt="' + escapeHTML(title) + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
                        '<div class="img-fallback w-full h-full flex items-center justify-center bg-gray-100" style="display:none;"><i class="fas fa-image text-gray-300 text-3xl"></i></div>' +
                    '</div>';
                } else {
                    coverHTML = '<div class="aspect-[16/10] flex items-center justify-center" style="background: linear-gradient(135deg, #FFF0ED, #FFE8E3);">' +
                        '<i class="fas fa-newspaper text-3xl" style="color: var(--primary); opacity: 0.3;"></i>' +
                    '</div>';
                }

                var card = document.createElement('div');
                card.className = 'article-card bg-white rounded-2xl shadow-sm border border-gray-100';
                card.innerHTML =
                    coverHTML +
                    '<div class="p-5">' +
                        (categoryName ? '<span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium mb-2" style="background: var(--primary-light); color: var(--primary);">' + escapeHTML(categoryName) + '</span>' : '') +
                        '<h3 class="text-base font-semibold text-gray-800 mb-2 line-clamp-2 leading-snug">' + escapeHTML(title) + '</h3>' +
                        (summary ? '<p class="text-sm text-gray-500 mb-3 line-clamp-2 leading-relaxed">' + escapeHTML(summary) + '</p>' : '') +
                        '<div class="flex items-center justify-between text-xs text-gray-400">' +
                            '<span><i class="fas fa-eye mr-1"></i>' + readCount + ' 次阅读</span>' +
                            '<span><i class="fas fa-calendar-alt mr-1"></i>' + date + '</span>' +
                        '</div>' +
                    '</div>';

                card.addEventListener('click', function () {
                    showArticleDetail(id);
                });

                grid.appendChild(card);
            });
        }

        // ==================== ARTICLE DETAIL ====================
        function showArticleDetail(articleId) {
            // Hide list, show detail
            document.getElementById('articleListView').style.display = 'none';
            document.getElementById('articleDetailView').style.display = '';
            document.getElementById('detailContent').innerHTML = '';
            document.getElementById('detailLoading').style.display = 'block';
            document.getElementById('viewTitle').textContent = '文章详情';
            document.getElementById('viewSubtitle').textContent = '';

            api.get('/api/science/articles/' + articleId)
                .then(function (res) {
                    document.getElementById('detailLoading').style.display = 'none';
                    var data = parseData(res);

                    var title = data.title || '未命名文章';
                    var cover = data.coverImage || data.cover || data.image || '';
                    var content = data.content || data.body || data.text || '';
                    var categoryName = data.categoryName || data.category || '';
                    var readCount = data.readCount || data.views || data.viewCount || 0;
                    var date = formatDateTime(data.createdAt || data.createTime || data.publishDate || data.date);

                    // Update title in header
                    document.getElementById('viewTitle').textContent = title;
                    document.getElementById('viewSubtitle').textContent = '';

                    // Cover image
                    var coverEl = document.getElementById('detailCover');
                    if (cover) {
                        coverEl.innerHTML = '<img class="w-full h-full object-cover" src="' + escapeHTML(cover) + '" alt="' + escapeHTML(title) + '" onerror="this.style.display=\'none\';">';
                        coverEl.style.display = '';
                    } else {
                        coverEl.style.display = 'none';
                    }

                    // Title
                    document.getElementById('detailTitle').textContent = title;

                    // Category
                    var catEl = document.getElementById('detailCategory');
                    if (categoryName) {
                        catEl.textContent = categoryName;
                        catEl.style.display = '';
                    } else {
                        catEl.style.display = 'none';
                    }

                    // Read count
                    document.getElementById('detailReadCount').innerHTML = '<i class="fas fa-eye mr-1"></i>' + readCount + ' 次阅读';

                    // Date
                    document.getElementById('detailDate').innerHTML = '<i class="fas fa-calendar-alt mr-1"></i>' + date;

                    // Content - render as HTML (supports rich text)
                    var contentEl = document.getElementById('detailContent');
                    if (content) {
                        contentEl.innerHTML = content;
                    } else {
                        contentEl.innerHTML = '<p class="text-gray-400 text-center py-8">暂无内容</p>';
                    }

                    // Scroll to top
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                })
                .catch(function (err) {
                    document.getElementById('detailLoading').style.display = 'none';
                    console.error('Failed to load article:', err);
                    showToast('加载文章详情失败', 'error');
                    backToList();
                });
        }

        function backToList() {
            document.getElementById('articleDetailView').style.display = 'none';
            document.getElementById('articleListView').style.display = '';
            document.getElementById('viewTitle').textContent = '心理科普';
            document.getElementById('viewSubtitle').textContent = '了解心理学知识，关注心理健康';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== EVENT BINDINGS ====================
        document.getElementById('btnBackToList').addEventListener('click', backToList);

        document.getElementById('loadMoreBtn').addEventListener('click', function () {
            if (isLoading) return;
            currentPage++;
            loadArticles(true);
        });

        // ==================== INIT ====================
        loadCategories();
        loadArticles(false);
    })();
    </script>
</body>
</html>
