<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咨询对话</title>
    <link href="css/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #FDF8F5; --primary: #FF7E67; --primary-dark: #E8694F; }
        * { box-sizing: border-box; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', Roboto, sans-serif; color: #333; }
        .bubble-user { background: #FFF; color: #333; border: 1px solid #e5e5e5; border-radius: 16px 16px 4px 16px; padding: 10px 14px; max-width: 75%; word-wrap: break-word; }
        .bubble-me { background: var(--primary); color: #fff; border-radius: 16px 16px 16px 4px; padding: 10px 14px; max-width: 75%; word-wrap: break-word; }
        .btn-primary { background: var(--primary); color: #fff; border: none; cursor: pointer; border-radius: 20px; padding: 8px 20px; font-size: 14px; }
        .btn-primary:hover { background: var(--primary-dark); }
        .notice-banner { border-radius: 12px; padding: 12px 16px; text-align: center; font-size: 13px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="sticky top-0 bg-white shadow-sm z-10">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
            <a href="home.html" class="text-gray-500 hover:text-gray-700"><i class="fas fa-arrow-left"></i> 返回</a>
            <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center font-bold text-white text-sm" id="userAvatar">用</div>
            <div class="flex-1">
                <span class="font-medium text-gray-800" id="userName">用户</span>
                <span class="text-xs text-gray-400 ml-2" id="chatTypeLabel"></span>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-4 max-w-2xl mx-auto w-full" id="messageArea">
        <div id="loadingState" class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
        <div id="emptyState" class="text-center py-16 hidden">
            <i class="far fa-comment-dots text-gray-300 text-5xl"></i>
            <p class="text-gray-400 mt-4">暂无消息</p>
        </div>
        <div id="messageList" class="space-y-3 hidden"></div>
    </main>

    <div id="permissionBanner" class="hidden"></div>
    <div id="inputArea" class="sticky bottom-0 bg-white border-t border-gray-100 px-4 py-3">
        <div class="flex items-center gap-2 max-w-2xl mx-auto">
            <input id="messageInput" type="text" placeholder="输入回复..." class="flex-1 px-4 py-2.5 bg-gray-50 rounded-full border border-gray-200 focus:outline-none focus:border-[#FF7E67] text-sm" maxlength="500" autocomplete="off">
            <button id="sendBtn" class="w-10 h-10 rounded-full btn-primary flex items-center justify-center"><i class="fa-solid fa-paper-plane text-sm"></i></button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
    (function() {
        if (!checkLogin()) return;

        var userInfo = JSON.parse(localStorage.getItem('counselor_info') || '{}');
        var counselorId = userInfo.id;
        var userId = parseInt(getQueryParam('userId'));
        var userName = getQueryParam('userName') || '用户';
        var appointmentId = getQueryParam('appointmentId') ? parseInt(getQueryParam('appointmentId')) : null;
        var isDirect = !appointmentId;
        var messageList = [];
        var currentPage = 1;
        var hasMore = false;
        var pollingTimer = null;

        if (!userId || !counselorId) { alert('参数错误'); window.location.href = 'home.html'; return; }

        document.getElementById('userName').textContent = userName;
        document.getElementById('userAvatar').textContent = userName.charAt(0);
        document.getElementById('chatTypeLabel').textContent = isDirect ? '直接消息' : '预约对话';

        // Check permissions
        checkPermission();

        function checkPermission() {
            if (isDirect) {
                document.getElementById('inputArea').style.display = 'none';
                var banner = document.getElementById('permissionBanner');
                banner.className = 'notice-banner bg-yellow-50 border border-yellow-200 text-yellow-700 mx-4 mb-2 max-w-2xl mx-auto';
                banner.innerHTML = '<i class="fa-solid fa-circle-info mr-1"></i> 这是用户直接发送的消息，需等待用户预约后才能回复';
                banner.style.display = 'block';
                return;
            }
            // Check appointment status
            api.get('/api/appointments/' + appointmentId).then(function(res) {
                if (res.code === 200 && res.data) {
                    var status = res.data.status;
                    if (status === 2 || status === 3) {
                        document.getElementById('inputArea').style.display = 'none';
                        var banner = document.getElementById('permissionBanner');
                        banner.className = 'notice-banner bg-gray-100 border border-gray-200 text-gray-500 mx-4 mb-2 max-w-2xl mx-auto';
                        banner.innerHTML = '<i class="fa-solid fa-lock mr-1"></i> 预约已' + (status===2?'完成':'取消') + '，不能继续发送消息';
                        banner.style.display = 'block';
                    }
                }
            }).catch(function(){});
        }

        bindEvents();
        loadMessages(1);
        markAsRead();
        startPolling();

        function bindEvents() {
            document.getElementById('sendBtn').addEventListener('click', handleSend);
            document.getElementById('messageInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') handleSend();
            });
        }

        function loadMessages(page) {
            var url = '/api/chat/messages?userId=' + userId + '&counselorId=' + counselorId +
                      '&page=' + page + '&size=30';
            url += isDirect ? '&appointmentId=0' : '&appointmentId=' + appointmentId;

            api.get(url).then(function(res) {
                if (res.code !== 200) return;
                document.getElementById('loadingState').classList.add('hidden');
                var msgs = (res.data.messages || []).slice().reverse();
                hasMore = res.data.hasMore || false;
                if (page === 1) {
                    messageList = msgs;
                } else {
                    messageList = msgs.concat(messageList);
                }
                currentPage = page;
                renderMessages();
            }).catch(function() {
                document.getElementById('loadingState').innerHTML = '<p class="text-red-400">加载失败</p>';
            });
        }

        function renderMessages() {
            var el = document.getElementById('messageList');
            if (messageList.length === 0) {
                el.classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            document.getElementById('emptyState').classList.add('hidden');
            el.classList.remove('hidden');
            el.innerHTML = messageList.map(function(m) {
                var isMe = m.sender === 'counselor';
                var bubbleClass = isMe ? 'bubble-me' : 'bubble-user';
                var align = isMe ? 'justify-end' : 'justify-start';
                return '<div class="flex ' + align + '"><div class="' + bubbleClass + '">' +
                    escapeHtml(m.content) +
                    '<div class="text-xs mt-1 ' + (isMe ? 'text-white/70' : 'text-gray-400') + '">' + (m.time || '') + '</div>' +
                '</div></div>';
            }).join('');
            document.getElementById('messageArea').scrollTop = document.getElementById('messageArea').scrollHeight;
        }

        function handleSend() {
            var content = document.getElementById('messageInput').value.trim();
            if (!content) return;
            document.getElementById('sendBtn').disabled = true;

            api.post('/api/chat/send', {
                userId: userId, counselorId: counselorId,
                content: content, appointmentId: appointmentId || 0
            }).then(function(res) {
                if (res.code === 200) {
                    document.getElementById('messageInput').value = '';
                    // Reload to get the new message
                    setTimeout(function() { loadMessages(currentPage); }, 500);
                } else {
                    alert(res.msg || '发送失败');
                }
            }).catch(function(err) {
                alert('发送失败: ' + (err.message || '网络错误'));
            }).finally(function() {
                document.getElementById('sendBtn').disabled = false;
            });
        }

        function markAsRead() {
            api.put('/api/chat/read', { userId: userId, counselorId: counselorId }).catch(function(){});
        }

        function startPolling() {
            pollingTimer = setInterval(function() {
                api.get('/api/chat/messages?userId=' + userId + '&counselorId=' + counselorId +
                        '&page=1&size=5' + (isDirect ? '&appointmentId=0' : '&appointmentId=' + appointmentId))
                .then(function(res) {
                    if (res.code !== 200 || !res.data || !res.data.messages) return;
                    var latest = res.data.messages[0];
                    if (latest && !messageList.some(function(m) { return m.id === latest.id; })) {
                        messageList.push(latest);
                        renderMessages();
                        markAsRead();
                    }
                }).catch(function(){});
            }, 5000);
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        window.addEventListener('beforeunload', function() {
            if (pollingTimer) clearInterval(pollingTimer);
        });
    })();
    </script>
</body>
</html>
