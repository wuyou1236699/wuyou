<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理咨询 - 首页</title>
    <link href="css/tailwind.min.css" rel="stylesheet">
    <link href="css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #FDF8F5;
            --primary: #FF7E67;
            --primary-dark: #E8694F;
            --primary-light: #FFF0ED;
            --primary-50: #FFF5F3;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Roboto, sans-serif;
            color: #333;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Buttons */
        .btn-primary {
            background-color: var(--primary);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(255, 126, 103, 0.35);
        }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-outline:hover {
            background-color: var(--primary-50);
        }
        .btn-white {
            background: #fff;
            color: var(--primary);
            border: 1px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-white:hover {
            border-color: var(--primary);
            background-color: var(--primary-50);
        }

        /* Hero gradient */
        .hero-gradient {
            background: linear-gradient(160deg, #FFF0ED 0%, #FDF8F5 40%, #FFF8F6 70%, #FDF8F5 100%);
        }

        /* Card hover effect */
        .counselor-card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .counselor-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 126, 103, 0.12);
        }

        /* Dropdown */
        .dropdown-menu {
            display: none;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .dropdown-menu.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Online dot */
        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .online-dot.online {
            background-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }
        .online-dot.offline {
            background-color: #d1d5db;
        }

        /* Avatar placeholder */
        .avatar-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* Expertise tags */
        .expertise-tag {
            display: inline-block;
            background-color: var(--primary-50);
            color: var(--primary);
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* Mobile nav overlay */
        .mobile-nav-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 40;
            display: none;
        }
        .mobile-nav-overlay.show { display: block; }

        .mobile-nav-panel {
            position: fixed;
            top: 0; right: 0;
            width: 260px;
            height: 100vh;
            background: #fff;
            z-index: 50;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -4px 0 20px rgba(0,0,0,0.08);
        }
        .mobile-nav-panel.show {
            transform: translateX(0);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- ==================== TOP NAVIGATION ==================== -->
    <nav class="sticky top-0 bg-white shadow-sm z-30">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <!-- Brand -->
            <a href="home.html" class="flex items-center space-x-2 text-xl font-bold no-underline" style="color: var(--primary);">
                <span class="text-2xl">🧠</span>
                <span class="hidden sm:inline">心理咨询</span>
            </a>

            <!-- Desktop nav links -->
            <div class="hidden md:flex items-center space-x-7">
                <a href="home.html" class="text-sm font-semibold no-underline" style="color: var(--primary);">首页</a>
                <a href="messages.html" class="text-sm text-gray-600 hover:text-gray-900 no-underline transition-colors">消息</a>
                <a href="ai-chat.html" class="text-sm text-gray-600 hover:text-gray-900 no-underline transition-colors">AI对话</a>
                <a href="science.html" class="text-sm text-gray-600 hover:text-gray-900 no-underline transition-colors">科普</a>
                <a href="tests.html" class="text-sm text-gray-600 hover:text-gray-900 no-underline transition-colors">测评</a>

                <!-- User dropdown -->
                <div class="relative" id="userDropdown">
                    <button id="dropdownBtn" class="flex items-center space-x-2 focus:outline-none hover:opacity-80 transition-opacity bg-transparent border-0 cursor-pointer">
                        <div id="navAvatar" class="avatar-placeholder w-8 h-8 text-white text-sm" style="background-color: var(--primary);">
                            <span id="navAvatarText">用</span>
                        </div>
                        <span id="navNickname" class="text-sm text-gray-700 hidden lg:inline">用户</span>
                        <i class="fas fa-chevron-down text-xs text-gray-400"></i>
                    </button>
                    <div id="dropdownMenu" class="dropdown-menu absolute right-0 mt-2 w-44 bg-white rounded-xl shadow-lg border border-gray-100 py-1.5">
                        <a href="profile.html" class="flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 no-underline transition-colors rounded-t-xl">
                            <i class="fas fa-user-circle mr-3 text-gray-400"></i>个人中心
                        </a>
                        <hr class="my-1 border-gray-100">
                        <button onclick="logout()" class="w-full flex items-center text-left px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 transition-colors rounded-b-xl bg-transparent border-0 cursor-pointer">
                            <i class="fas fa-sign-out-alt mr-3"></i>退出登录
                        </button>
                    </div>
                </div>
            </div>

            <!-- Mobile hamburger -->
            <button id="mobileMenuBtn" class="md:hidden text-gray-600 hover:text-gray-900 focus:outline-none bg-transparent border-0 cursor-pointer p-2">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </div>
    </nav>

    <!-- Mobile nav overlay + panel -->
    <div id="mobileOverlay" class="mobile-nav-overlay"></div>
    <div id="mobilePanel" class="mobile-nav-panel">
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
            <span class="font-bold text-lg" style="color: var(--primary);">🧠 心理咨询</span>
            <button id="mobileCloseBtn" class="text-gray-400 hover:text-gray-600 bg-transparent border-0 cursor-pointer p-1">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="px-5 py-4 space-y-1">
            <a href="home.html" class="block py-3 text-sm font-semibold no-underline rounded-lg px-3" style="color: var(--primary); background: var(--primary-50);">首页</a>
            <a href="messages.html" class="block py-3 text-sm text-gray-700 hover:bg-gray-50 no-underline rounded-lg px-3 transition-colors">消息</a>
            <a href="ai-chat.html" class="block py-3 text-sm text-gray-700 hover:bg-gray-50 no-underline rounded-lg px-3 transition-colors">AI对话</a>
            <a href="science.html" class="block py-3 text-sm text-gray-700 hover:bg-gray-50 no-underline rounded-lg px-3 transition-colors">科普</a>
            <a href="tests.html" class="block py-3 text-sm text-gray-700 hover:bg-gray-50 no-underline rounded-lg px-3 transition-colors">测评</a>
            <hr class="my-3 border-gray-100">
            <a href="profile.html" class="block py-3 text-sm text-gray-700 hover:bg-gray-50 no-underline rounded-lg px-3 transition-colors">
                <i class="fas fa-user-circle mr-2 text-gray-400"></i>个人中心
            </a>
            <button onclick="logout()" class="w-full flex items-center py-3 text-sm text-red-500 hover:bg-red-50 rounded-lg px-3 transition-colors bg-transparent border-0 cursor-pointer">
                <i class="fas fa-sign-out-alt mr-2"></i>退出登录
            </button>
        </div>
    </div>

    <!-- ==================== HERO SECTION ==================== -->
    <section class="hero-gradient py-14 md:py-20">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <h1 class="text-2xl md:text-4xl font-bold text-gray-800 mb-3 tracking-tight" id="heroGreeting">
                你好，<span id="heroNickname">朋友</span>
            </h1>
            <p class="text-base md:text-lg text-gray-500 leading-relaxed">
                我们在这里，倾听你的每一个心声
            </p>
        </div>
    </section>

    <!-- ==================== QUICK ACTIONS ==================== -->
    <section class="max-w-6xl mx-auto px-4 -mt-8 mb-10 relative z-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <!-- 预约咨询 -->
            <a href="book.html" class="no-underline bg-white rounded-2xl shadow-md p-5 md:p-6 flex items-center space-x-4 hover:shadow-lg transition-shadow group">
                <div class="w-14 h-14 rounded-full flex items-center justify-center text-2xl flex-shrink-0" style="background-color: var(--primary-light);">
                    <i class="fas fa-calendar-plus" style="color: var(--primary);"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="text-lg font-semibold text-gray-800">预约咨询</h3>
                    <p class="text-sm text-gray-500 mt-0.5">选择适合你的咨询师，预约一场倾听之旅</p>
                </div>
                <i class="fas fa-chevron-right text-gray-300 group-hover:text-gray-500 transition-colors flex-shrink-0"></i>
            </a>

            <!-- 我的预约 -->
            <a href="appointments.html" class="no-underline bg-white rounded-2xl shadow-md p-5 md:p-6 flex items-center space-x-4 hover:shadow-lg transition-shadow group">
                <div class="w-14 h-14 rounded-full flex items-center justify-center text-2xl flex-shrink-0" style="background-color: var(--primary-light);">
                    <i class="fas fa-list-check" style="color: var(--primary);"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="text-lg font-semibold text-gray-800">我的预约</h3>
                    <p class="text-sm text-gray-500 mt-0.5">查看和管理你的咨询预约记录</p>
                </div>
                <i class="fas fa-chevron-right text-gray-300 group-hover:text-gray-500 transition-colors flex-shrink-0"></i>
            </a>
        </div>
    </section>

    <!-- ==================== ANNOUNCEMENT BANNER ==================== -->
    <section class="max-w-6xl mx-auto px-4 mb-10" id="announcementSection" style="display:none;">
        <div class="bg-yellow-50 border border-yellow-200 rounded-xl px-5 py-4 flex items-start space-x-3">
            <i class="fas fa-bullhorn text-yellow-500 mt-0.5 flex-shrink-0"></i>
            <div class="flex-1 min-w-0">
                <span id="announcementTitle" class="text-sm font-semibold text-yellow-800 mr-2"></span>
                <span id="announcementContent" class="text-sm text-yellow-700"></span>
            </div>
            <button onclick="document.getElementById('announcementSection').style.display='none'" class="text-yellow-400 hover:text-yellow-600 flex-shrink-0 bg-transparent border-0 cursor-pointer p-1">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </section>

    <!-- ==================== COUNSELOR LIST ==================== -->
    <section class="max-w-6xl mx-auto px-4 pb-16">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl md:text-2xl font-bold text-gray-800">咨询师列表</h2>
            <span id="counselorCount" class="text-sm text-gray-400"></span>
        </div>

        <!-- Counselor grid -->
        <div id="counselorGrid" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <!-- Dynamically rendered -->
        </div>

        <!-- Load more -->
        <div id="loadMoreContainer" class="text-center mt-8" style="display:none;">
            <button id="loadMoreBtn" class="btn-white px-10 py-3 rounded-full text-sm font-medium">
                加载更多 <i class="fas fa-chevron-down ml-1 text-xs"></i>
            </button>
        </div>

        <!-- Loading indicator -->
        <div id="loadingIndicator" class="text-center py-12" style="display:none;">
            <div class="inline-flex items-center space-x-2 text-gray-400">
                <i class="fas fa-spinner fa-spin"></i>
                <span class="text-sm">正在加载咨询师...</span>
            </div>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="text-center py-16" style="display:none;">
            <div class="w-20 h-20 mx-auto mb-4 rounded-full flex items-center justify-center" style="background: #f3f4f6;">
                <i class="fas fa-user-group text-gray-300 text-3xl"></i>
            </div>
            <p class="text-gray-500 font-medium">暂无咨询师列表</p>
            <p class="text-gray-400 text-sm mt-1">请稍后再来查看</p>
        </div>
    </section>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
    (function () {
        'use strict';

        // ==================== 登录守卫 ====================
        if (!checkLogin()) return;

        // ==================== 分页状态 ====================
        var currentPage = 1;
        var totalPages = 1;
        var pageSize = 20;
        var isLoading = false;

        // ==================== 加载用户信息 ====================
        var userInfo = getUserInfo();
        if (userInfo) {
            var nickname = userInfo.nickname || userInfo.username || userInfo.name || '朋友';
            document.getElementById('heroNickname').textContent = nickname;
            document.getElementById('navNickname').textContent = nickname;

            var avatarText = (nickname.charAt(0) || '用').toUpperCase();
            document.getElementById('navAvatarText').textContent = avatarText;

            // If user has an avatar URL, use it
            if (userInfo.avatar) {
                var navAvatar = document.getElementById('navAvatar');
                var navAvatarText = document.getElementById('navAvatarText');
                if (navAvatar && navAvatarText) {
                    navAvatarText.style.display = 'none';
                    navAvatar.style.backgroundImage = 'url(' + userInfo.avatar + ')';
                    navAvatar.style.backgroundSize = 'cover';
                    navAvatar.style.backgroundPosition = 'center';
                }
            }
        }

        // ==================== 下拉菜单 ====================
        (function initDropdown() {
            var btn = document.getElementById('dropdownBtn');
            var menu = document.getElementById('dropdownMenu');
            var isOpen = false;

            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                isOpen = !isOpen;
                if (isOpen) {
                    menu.classList.add('show');
                } else {
                    menu.classList.remove('show');
                }
            });

            document.addEventListener('click', function () {
                if (isOpen) {
                    isOpen = false;
                    menu.classList.remove('show');
                }
            });

            menu.addEventListener('click', function (e) {
                e.stopPropagation();
            });
        })();

        // ==================== 移动端菜单 ====================
        (function initMobileMenu() {
            var menuBtn = document.getElementById('mobileMenuBtn');
            var closeBtn = document.getElementById('mobileCloseBtn');
            var overlay = document.getElementById('mobileOverlay');
            var panel = document.getElementById('mobilePanel');

            function open() {
                overlay.classList.add('show');
                panel.classList.add('show');
                document.body.style.overflow = 'hidden';
            }

            function close() {
                overlay.classList.remove('show');
                panel.classList.remove('show');
                document.body.style.overflow = '';
            }

            menuBtn.addEventListener('click', open);
            closeBtn.addEventListener('click', close);
            overlay.addEventListener('click', close);
        })();

        // ==================== 退出登录 ====================
        window.logout = function () {
            localStorage.removeItem('user_token');
            localStorage.removeItem('user_info');
            window.location.href = 'index.html';
        };

        // ==================== 公告 ====================
        (function loadAnnouncements() {
            api.get('/api/public/announcements')
                .then(function (res) {
                    var list = Array.isArray(res) ? res : (res && res.data ? (Array.isArray(res.data) ? res.data : (res.data.records || [])) : []);
                    if (!list || list.length === 0) return;

                    var item = list[0];
                    if (!item) return;

                    var section = document.getElementById('announcementSection');
                    section.style.display = 'block';

                    if (item.title) {
                        document.getElementById('announcementTitle').textContent = '【' + item.title + '】';
                    }
                    document.getElementById('announcementContent').textContent = item.content || '';
                })
                .catch(function () {
                    // Silently ignore announcement errors
                });
        })();

        // ==================== 咨询师列表 ====================
        function fetchOnlineStatus() {
            return api.get('/api/counselors/online-status-list')
                .then(function (res) {
                    var list = Array.isArray(res) ? res : (res && res.data ? res.data : []);
                    var map = {};
                    list.forEach(function (item) {
                        var cid = item.counselorId;
                        map[cid] = item.online === true || item.online === 'true' || item.online === 1;
                    });
                    return map;
                })
                .catch(function () {
                    return {}; // Return empty map on error
                });
        }

        function fetchCounselors(page, append) {
            if (isLoading) return;
            isLoading = true;

            var loadingEl = document.getElementById('loadingIndicator');
            var emptyEl = document.getElementById('emptyState');
            var loadMoreEl = document.getElementById('loadMoreContainer');
            var gridEl = document.getElementById('counselorGrid');

            if (!append) {
                gridEl.innerHTML = '';
            }
            emptyEl.style.display = 'none';
            loadMoreEl.style.display = 'none';
            loadingEl.style.display = 'block';

            Promise.all([
                api.get('/api/counselor/list?page=' + page + '&size=' + pageSize),
                fetchOnlineStatus()
            ])
            .then(function (results) {
                var counselorRes = results[0];
                var onlineMap = results[1];

                var records = [];
                if (Array.isArray(counselorRes)) {
                    records = counselorRes;
                } else if (counselorRes && counselorRes.data) {
                    if (Array.isArray(counselorRes.data)) {
                        records = counselorRes.data;
                    } else if (counselorRes.data.records) {
                        records = counselorRes.data.records;
                        totalPages = counselorRes.data.pages || 1;
                    }
                }

                loadingEl.style.display = 'none';

                if (records.length === 0) {
                    if (!append) {
                        emptyEl.style.display = 'block';
                        document.getElementById('counselorCount').textContent = '';
                    }
                    loadMoreEl.style.display = 'none';
                    isLoading = false;
                    return;
                }

                renderCounselors(records, onlineMap, append);

                var totalCount = (counselorRes && counselorRes.data && counselorRes.data.total) ? counselorRes.data.total : '';
                document.getElementById('counselorCount').textContent = totalCount ? '共 ' + totalCount + ' 位' : '';

                if (currentPage < totalPages) {
                    loadMoreEl.style.display = 'block';
                } else {
                    loadMoreEl.style.display = 'none';
                }

                isLoading = false;
            })
            .catch(function (err) {
                loadingEl.style.display = 'none';
                isLoading = false;
                if (!append) {
                    emptyEl.style.display = 'block';
                }
                console.error('Failed to load counselors:', err);
                showToast('加载咨询师列表失败，请重试', 'error');
            });
        }

        function renderCounselors(records, onlineMap, append) {
            var grid = document.getElementById('counselorGrid');
            if (!append) {
                grid.innerHTML = '';
            }

            records.forEach(function (counselor) {
                var id = counselor.id;
                var name = counselor.name || '咨询师';
                var avatar = counselor.avatar || '';
                var rating = typeof counselor.avgRating === 'number' ? counselor.avgRating : typeof counselor.rating === 'number' ? counselor.rating : parseFloat(counselor.avgRating || counselor.rating) || 0;
                var expertise = counselor.expertise || '';
                var consultCount = counselor.appointmentCount || counselor.consultCount || counselor.consultationCount || 0;
                var isOnline = onlineMap[id] === true;

                // Parse expertise into array
                var expertiseList = [];
                if (typeof expertise === 'string') {
                    expertiseList = expertise.split(/[,，、\s]+/).filter(Boolean);
                } else if (Array.isArray(expertise)) {
                    expertiseList = expertise;
                }

                // Build expertise tags HTML (max 4)
                var expertiseHTML = '';
                var showTags = expertiseList.slice(0, 4);
                showTags.forEach(function (tag) {
                    expertiseHTML += '<span class="expertise-tag">' + escapeHTML(tag) + '</span>';
                });

                // Avatar HTML
                var avatarHTML;
                if (avatar && avatar.trim()) {
                    avatarHTML = '<div class="avatar-placeholder w-14 h-14 text-white text-lg flex-shrink-0" style="background-image:url(' + escapeHTML(avatar) + ');background-size:cover;background-position:center;"></div>';
                } else {
                    avatarHTML = '<div class="avatar-placeholder w-14 h-14 text-white text-lg flex-shrink-0" style="background-color:' + getAvatarColor(name) + ';">' + escapeHTML(name.charAt(0)) + '</div>';
                }

                // Online status dot
                var onlineDotHTML = isOnline
                    ? '<span class="online-dot online"></span><span class="text-xs text-green-600 ml-1">在线</span>'
                    : '<span class="online-dot offline"></span><span class="text-xs text-gray-400 ml-1">离线</span>';

                var card = document.createElement('div');
                card.className = 'counselor-card bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col';
                card.innerHTML =
                    '<div class="flex items-start space-x-4 mb-4">' +
                        avatarHTML +
                        '<div class="flex-1 min-w-0">' +
                            '<div class="flex items-center space-x-2 mb-1">' +
                                '<h3 class="text-base font-semibold text-gray-800 truncate">' + escapeHTML(name) + '</h3>' +
                                '<div class="flex items-center flex-shrink-0">' + onlineDotHTML + '</div>' +
                            '</div>' +
                            '<div class="flex items-center text-sm">' + starRating(rating) + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="flex flex-wrap gap-1.5 mb-4 min-h-[1.5rem]">' +
                        (expertiseHTML || '<span class="text-xs text-gray-400">暂无标签</span>') +
                    '</div>' +
                    '<div class="flex items-center text-xs text-gray-400 mb-4">' +
                        '<i class="fas fa-user-check mr-1.5"></i>已服务 <span class="font-medium text-gray-600">' + consultCount + '</span> 次' +
                    '</div>' +
                    '<div class="mt-auto flex items-center space-x-2">' +
                        '<button class="btn-white flex-1 py-2 rounded-lg text-xs font-medium" data-action="detail" data-id="' + id + '">' +
                            '<i class="fas fa-info-circle mr-1"></i>查看详情' +
                        '</button>' +
                        '<button class="btn-primary flex-1 py-2 rounded-lg text-xs font-medium shadow-sm" data-action="chat" data-id="' + id + '" data-name="' + escapeHTML(name) + '">' +
                            '<i class="fas fa-comment-dots mr-1"></i>发消息' +
                        '</button>' +
                        '<button class="btn-outline flex-1 py-2 rounded-lg text-xs font-medium" data-action="book" data-id="' + id + '">' +
                            '<i class="fas fa-calendar-check mr-1"></i>预约' +
                        '</button>' +
                    '</div>';

                // Attach event listeners
                card.querySelector('[data-action="detail"]').addEventListener('click', function () {
                    window.location.href = 'counselor-detail.html?id=' + id;
                });
                card.querySelector('[data-action="chat"]').addEventListener('click', function () {
                    window.location.href = 'chat.html?counselorId=' + id + '&name=' + encodeURIComponent(name);
                });
                card.querySelector('[data-action="book"]').addEventListener('click', function () {
                    window.location.href = 'book.html?counselorId=' + id;
                });

                grid.appendChild(card);
            });
        }

        // ==================== 加载更多 ====================
        document.getElementById('loadMoreBtn').addEventListener('click', function () {
            if (isLoading) return;
            currentPage++;
            fetchCounselors(currentPage, true);
        });

        // ==================== 工具函数 ====================
        function escapeHTML(str) {
            if (!str) return '';
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function getAvatarColor(name) {
            var colors = [
                '#FF7E67', '#FF9A76', '#F9A826', '#6C5CE7',
                '#00B894', '#0984E3', '#E17055', '#D63031',
                '#FDCB6E', '#00CEC9', '#A29BFE', '#55EFC4'
            ];
            var hash = 0;
            for (var i = 0; i < (name || '').length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        fetchCounselors(1, false);
    })();
    </script>
</body>
</html>
